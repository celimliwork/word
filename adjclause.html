<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjective Clauses Master - 50 Soru</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 700px; text-align: center; }
        .header { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; line-height: 1.6; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-size: 1rem; cursor: pointer; border: 2px solid #3498db; background: white; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #3498db; color: white; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: left; font-size: 0.95rem; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #next-btn { margin-top: 20px; background: #2ecc71; color: white; border: none; padding: 15px 30px; display: none; width: 100%; }
        .progress { margin-bottom: 15px; font-size: 0.9rem; color: #666; }
        .stat-box { display: none; }
        .highlight { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h2>Adjective Clauses Master</h2>
        <div class="progress">Soru: <span id="current-q">1</span>/50</div>
    </div>

    <div id="quiz-section">
        <div class="question" id="question-text">Soru yükleniyor...</div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Sıradaki Soru →</button>
    </div>

    <div id="result-section" class="stat-box">
        <h3>Sınav Tamamlandı!</h3>
        <p id="final-score"></p>
        <div id="mistake-analysis"></div>
        <button onclick="restartMistakes()" id="retry-btn" style="display:none; background:#e67e22; color:white;">Sadece Yanlışları Tekrar Çöz</button>
        <button onclick="location.reload()" style="margin-top:10px;">Baştan Başla</button>
    </div>
</div>

<script>
const allQuestions = [
    // 1-10: Subject/Object (Who, Which, That, Whom)
    { q: "The woman --- lives next door is a doctor.", a: ["who", "which"], c: 0, r: "Subject position: İnsanlar için 'who' veya 'that' kullanılır. Boşluktan sonra fiil (lives) gelmiş." },
    { q: "The book --- I bought yesterday is very interesting.", a: ["who", "which"], c: 1, r: "Object position: İnsan dışı varlıklar için 'which' veya 'that' kullanılır." },
    { q: "The man --- you met at the party is my uncle.", a: ["whom", "whose"], c: 0, r: "Object position: Bir insanı niteliyoruz ve boşluktan sonra S+V (you met) geliyor. 'Whom' uygundur." },
    { q: "Everything --- he said was a lie.", a: ["which", "that"], c: 1, r: "Kural: 'Everything, something, all, the only' gibi ifadelerden sonra 'that' kullanımı önceliklidir." },
    { q: "The students --- are playing football are in my class.", a: ["who", "whom"], c: 0, r: "Subject position: Fiilden (are) önce 'who' kullanılır, 'whom' kullanılamaz." },
    { q: "This is the car --- my father wants to buy.", a: ["that", "who"], c: 0, r: "Nesne konumu: Cansız varlıklar için 'that' veya 'which' kullanılır." },
    { q: "The people --- we invited to the wedding couldn't come.", a: ["whose", "that"], c: 1, r: "Nesne konumu: İnsanlar için 'that', 'who' veya 'whom' kullanılabilir." },
    { q: "The laptop --- is on the table is mine.", a: ["who", "which"], c: 1, r: "Özne konumu: Cansız varlıklar için 'which' kullanılır." },
    { q: "The girl --- everyone is talking about is very talented.", a: ["whom", "which"], c: 0, r: "İnsan nitelemesi olduğu için 'whom' seçilmelidir." },
    { q: "I have a friend --- speaks five languages.", a: ["who", "whose"], c: 0, r: "Özne konumu: Boşluktan sonra direkt fiil geldiği için 'who' gerekir." },

    // 11-20: Possessive (Whose)
    { q: "The girl --- brother is a pilot is my friend.", a: ["whose", "who"], c: 0, r: "Possessive: İsim + isim (girl's brother) ilişkisi olduğu için 'whose' kullanılır." },
    { q: "A widow is a woman --- husband is dead.", a: ["who", "whose"], c: 1, r: "Aitlik durumu: Boşluktan sonra gelen 'husband' kadına aittir." },
    { q: "The house --- roof was damaged has been repaired.", a: ["which", "whose"], c: 1, r: "Cansızlarda da aitlik için 'whose' kullanılabilir (Evin çatısı)." },
    { q: "I know a man --- name is Sherlock.", a: ["whose", "who"], c: 0, r: "İsim + isim (man's name) bağı 'whose' ile kurulur." },
    { q: "The company --- products are sold worldwide is growing.", a: ["which", "whose"], c: 1, r: "Şirketin ürünleri -> Whose products." },
    { q: "The tree --- leaves turn red in autumn is a maple.", a: ["whose", "that"], c: 0, r: "Aitlik: Ağacın yaprakları." },
    { q: "Yesterday I met someone --- father knows you.", a: ["who", "whose"], c: 1, r: "Birinin babası -> Whose father." },
    { q: "The car --- engine failed was towed away.", a: ["which", "whose"], c: 1, r: "Arabanın motoru -> Whose engine." },
    { q: "The artist --- work you admire is here.", a: ["whose", "whom"], c: 0, r: "Sanatçının işi -> Whose work." },
    { q: "A person --- life is full of stress should relax.", a: ["whose", "who"], c: 0, r: "Kişinin hayatı -> Whose life." },

    // 21-30: Place, Time, Reason (Where, When, Why)
    { q: "The hotel --- we stayed was very clean.", a: ["where", "which"], c: 0, r: "Place: Mekan niteleniyor ve içeride bir eylem tam cümle (SVO) olarak verilmiş." },
    { q: "I will never forget the day --- I met you.", a: ["when", "which"], c: 0, r: "Time: Zaman ifadesinden sonra tam cümle gelirse 'when' kullanılır." },
    { q: "The reason --- he was late is unknown.", a: ["why", "where"], c: 0, r: "Reason: 'The reason' ifadesi 'why' ile nitelenir." },
    { q: "The city --- I was born is very beautiful.", a: ["where", "which"], c: 0, r: "Mekan + Tam cümle = Where." },
    { q: "2020 was the year --- the pandemic started.", a: ["when", "which"], c: 0, r: "Zaman + Tam cümle = When." },
    { q: "The house --- he bought is very expensive.", a: ["where", "which"], c: 1, r: "Dikkat! Boşluktan sonra nesne eksik (He bought it). Bu yüzden 'where' değil 'which' kullanılır." },
    { q: "Summer is the season --- people go on holiday.", a: ["when", "which"], c: 0, r: "Zaman nitelemesi + tam cümle." },
    { q: "This is the library --- I study every day.", a: ["which", "where"], c: 1, r: "Mekan nitelemesi + tam cümle." },
    { q: "The office --- she works is in the city center.", a: ["where", "which"], c: 0, r: "Mekan nitelemesi (where = in which)." },
    { q: "I don't understand the reason --- she is angry.", a: ["why", "that"], c: 0, r: "Reason -> Why." },

    // 31-40: Prepositions (In which, From whom, etc.)
    { q: "The man --- I was talking to is my teacher.", a: ["whom", "whose"], c: 0, r: "Preposition sonda ise 'whom' veya 'who/that' kullanılabilir." },
    { q: "The chair --- I am sitting on is broken.", a: ["which", "where"], c: 0, r: "Nesne nitelemesi + Edat sonda." },
    { q: "The person --- I received this letter is my penpal.", a: ["from whom", "who"], c: 0, r: "Edat + whom: Letter from someone." },
    { q: "The drawer --- I keep my keys is locked.", a: ["in which", "which"], c: 0, r: "In which = Where anlamında kullanılmıştır." },
    { q: "The project --- we are working is very complex.", a: ["on which", "where"], c: 0, r: "Work 'on' something: On which." },
    { q: "The woman --- I borrowed the car is my neighbor.", a: ["from whom", "whose"], c: 0, r: "Borrow from someone." },
    { q: "The music --- we were listening was beautiful.", a: ["to which", "that"], c: 0, r: "Listen 'to' music." },
    { q: "The tools --- he fixed the car are in the garage.", a: ["with which", "which"], c: 0, r: "Fix 'with' tools." },
    { q: "The topic --- we discussed was interesting.", a: ["about which", "which"], c: 1, r: "Dikkat! 'Discuss' fiili edat almaz. Direkt 'which' kullanılır." },
    { q: "The film --- we are talking is famous.", a: ["about which", "where"], c: 0, r: "Talk 'about' something." },

    // 41-50: Reductions (Ving, V3, To V0)
    { q: "The man --- at the door is my uncle.", a: ["standing", "stood"], c: 0, r: "Active Reduction: 'Who is standing' yerine 'standing' kullanılır." },
    { q: "The books --- by Orhan Pamuk are famous.", a: ["writing", "written"], c: 1, r: "Passive Reduction: 'Which were written' yerine 'written' (V3) kullanılır." },
    { q: "He was the first man --- the moon.", a: ["to walk", "walking"], c: 0, r: "The first/last/only ifadelerinden sonra 'To V0' kullanılır." },
    { q: "The students --- the exam were very happy.", a: ["passing", "passed"], c: 0, r: "Active: Sınavı geçen öğrenciler (Who passed -> passing)." },
    { q: "The bridge --- last year is already broken.", a: ["built", "building"], c: 0, r: "Passive: İnşa edilen köprü (Which was built -> built)." },
    { q: "I have a lot of work --- today.", a: ["to do", "doing"], c: 0, r: "Purpose/Task: Yapılacak iş (to do)." },
    { q: "The girl --- the piano is my sister.", a: ["playing", "played"], c: 0, r: "Active: Who is playing -> playing." },
    { q: "The car --- in the accident was a total loss.", a: ["damaged", "damaging"], c: 0, r: "Passive: Hasar gören araba (Which was damaged)." },
    { q: "Anyone --- to join the club should sign here.", a: ["wanting", "wanted"], c: 0, r: "Active: İsteyen herhangi biri (Who wants)." },
    { q: "The only person --- the truth was Mary.", a: ["to know", "knowing"], c: 0, r: "The only/The best gibi yapılardan sonra 'To V0' gelir." }
];

let currentQuestions = [...allQuestions];
let currentIdx = 0;
let score = 0;
let mistakes = [];
let isReviewMode = false;

function loadQuestion() {
    const q = currentQuestions[currentIdx];
    document.getElementById("current-q").innerText = currentIdx + 1;
    document.getElementById("question-text").innerText = q.q;
    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";
    
    q.a.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(index);
        optionsContainer.appendChild(btn);
    });
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
}

function checkAnswer(selectedIdx) {
    const q = currentQuestions[currentIdx];
    const feedback = document.getElementById("feedback");
    const btns = document.querySelectorAll("#options-container button");
    
    feedback.style.display = "block";
    if(selectedIdx === q.c) {
        feedback.innerText = "Doğru! ✔️ " + q.r;
        feedback.className = "correct";
        if(!isReviewMode) score++;
    } else {
        feedback.innerHTML = `<span class="highlight">Yanlış! ❌</span> Doğru cevap: <b>${q.a[q.c]}</b><br>${q.r}`;
        feedback.className = "wrong";
        if(!isReviewMode) mistakes.push(q);
    }
    
    btns.forEach(btn => btn.disabled = true);
    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < currentQuestions.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById("quiz-section").style.display = "none";
    const resultSection = document.getElementById("result-section");
    resultSection.style.display = "block";
    
    const percent = Math.round((score / allQuestions.length) * 100);
    document.getElementById("final-score").innerText = `Skorun: ${score} / ${allQuestions.length} (%${percent})`;
    
    const analysis = document.getElementById("mistake-analysis");
    if(mistakes.length > 0) {
        analysis.innerHTML = `<p>${mistakes.length} soruda hata yaptın. Bu konuları tekrar etmelisin.</p>`;
        document.getElementById("retry-btn").style.display = "inline-block";
    } else {
        analysis.innerHTML = "<p>Mükemmel! Hiç hata yapmadın.</p>";
    }
}

function restartMistakes() {
    currentQuestions = [...mistakes];
    mistakes = [];
    currentIdx = 0;
    score = 0;
    isReviewMode = true;
    document.getElementById("result-section").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";
    document.querySelector(".progress").innerHTML = "<b>Hataları Tekrar Çözüyorsun</b>";
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
