<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerunds & Infinitives – Öğrenme Oyunu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-dark: #922B21;
    --red-light: #E74C3C;
    --cream: #FDF6EC;
    --warm: #F5E6D3;
    --charcoal: #1A1A2E;
    --grey: #6B7280;
    --light-grey: #E8DDD0;
    --green: #27AE60;
    --green-light: #2ECC71;
    --amber: #F39C12;
    --blue: #2980B9;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(192,57,43,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(192,57,43,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    background: var(--charcoal);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }

  .header-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .header-brand span { color: var(--red-light); }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
    flex-wrap: wrap;
  }

  .header-home {
    flex-shrink: 0;
    color: rgba(255,255,255,0.88);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.28);
    white-space: nowrap;
  }

  .header-home:hover {
    color: var(--white);
    border-bottom-color: var(--red-light);
  }

  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--white);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill .icon { font-size: 15px; }

  /* PROGRESS BAR */
  .progress-bar-container {
    background: var(--charcoal);
    padding: 0 24px 12px;
    position: sticky;
    top: 57px;
    z-index: 99;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--red-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME SCREEN */
  .home-hero {
    text-align: center;
    padding: 40px 0 20px;
  }

  .home-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 3px;
    margin-bottom: 20px;
  }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 7vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }

  .home-title .highlight { color: var(--red); }

  .home-subtitle {
    font-size: 16px;
    color: var(--grey);
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto 40px;
  }

  /* CATEGORY GRID */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .category-card {
    background: var(--white);
    border: 2px solid var(--light-grey);
    border-radius: 16px;
    padding: 20px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .category-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .category-card:hover::before { opacity: 0.04; }
  .category-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.12); }

  .category-card.selected {
    border-color: var(--red);
    background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
  }

  .category-card.selected .cat-check { opacity: 1; }

  .cat-check {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cat-icon { font-size: 26px; margin-bottom: 10px; display: block; }

  .cat-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--charcoal);
    margin-bottom: 4px;
  }

  .cat-count {
    font-size: 12px;
    color: var(--grey);
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--red);
    color: white;
    box-shadow: 0 4px 16px rgba(192,57,43,0.3);
  }

  .btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,57,43,0.4); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--warm);
    color: var(--charcoal);
    border: 2px solid var(--light-grey);
  }

  .btn-secondary:hover { border-color: var(--charcoal); }

  .btn-ghost {
    background: transparent;
    color: var(--grey);
    border: 2px solid var(--light-grey);
  }

  .btn-ghost:hover { border-color: var(--grey); color: var(--charcoal); }

  .btn-lg { padding: 18px 36px; font-size: 17px; }
  .btn-sm { padding: 9px 18px; font-size: 13px; }

  /* QUIZ SCREEN */
  .quiz-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .quiz-category-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--red);
    background: rgba(192,57,43,0.08);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
  }

  .quiz-counter {
    font-size: 13px;
    color: var(--grey);
    font-weight: 600;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--white);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 2px 40px rgba(0,0,0,0.06);
    border: 1px solid var(--light-grey);
    margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-type-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 16px;
    font-family: 'Syne', sans-serif;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(17px, 3vw, 22px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--charcoal);
    margin-bottom: 28px;
  }

  .question-text .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 3px solid var(--red);
    color: var(--red);
    padding: 0 4px;
    text-align: center;
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .option-btn {
    background: var(--cream);
    border: 2px solid var(--light-grey);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--charcoal);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .option-letter {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--light-grey);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--charcoal);
    background: var(--warm);
    transform: translateX(3px);
  }

  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--charcoal);
    color: white;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(39,174,96,0.08);
    color: var(--charcoal);
  }

  .option-btn.correct .option-letter {
    background: var(--green);
    color: white;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(192,57,43,0.06);
    color: var(--grey);
    text-decoration: line-through;
  }

  .option-btn.wrong .option-letter {
    background: var(--red);
    color: white;
  }

  .option-btn:disabled { cursor: default; }

  /* EXPLANATION BOX */
  .explanation-box {
    border-radius: 16px;
    padding: 20px 22px;
    margin-top: 16px;
    animation: fadeIn 0.4s ease;
    display: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explanation-box.correct-exp {
    background: rgba(39,174,96,0.08);
    border: 1.5px solid rgba(39,174,96,0.3);
  }

  .explanation-box.wrong-exp {
    background: rgba(192,57,43,0.06);
    border: 1.5px solid rgba(192,57,43,0.2);
  }

  .exp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .exp-emoji { font-size: 20px; }

  .exp-result {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  .exp-result.correct-text { color: var(--green); }
  .exp-result.wrong-text { color: var(--red); }

  .exp-answer {
    font-size: 14px;
    color: var(--charcoal);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .exp-why {
    font-size: 14px;
    color: var(--charcoal);
    line-height: 1.6;
  }

  .exp-rule {
    margin-top: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--grey);
    border-left: 3px solid var(--red);
    line-height: 1.6;
  }

  /* ACTION BUTTONS */
  .quiz-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 40px 0;
  }

  .result-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    display: block;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .result-score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 24px;
    position: relative;
  }

  .result-score-ring svg { transform: rotate(-90deg); }

  .result-score-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-score-number {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: var(--charcoal);
    line-height: 1;
  }

  .result-score-label {
    font-size: 12px;
    color: var(--grey);
    font-weight: 600;
    margin-top: 3px;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--charcoal);
    margin-bottom: 8px;
  }

  .result-subtitle {
    font-size: 15px;
    color: var(--grey);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin: 0 auto 32px;
  }

  .result-stat {
    background: var(--white);
    border: 1.5px solid var(--light-grey);
    border-radius: 14px;
    padding: 16px 10px;
  }

  .result-stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    display: block;
  }

  .result-stat-num.green { color: var(--green); }
  .result-stat-num.red { color: var(--red); }
  .result-stat-num.amber { color: var(--amber); }

  .result-stat-label {
    font-size: 12px;
    color: var(--grey);
    font-weight: 600;
    margin-top: 2px;
    display: block;
  }

  /* REFERENCE PANEL */
  .ref-toggle {
    text-align: center;
    margin-bottom: 20px;
  }

  .ref-panel {
    background: var(--white);
    border: 1.5px solid var(--light-grey);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
    display: none;
  }

  .ref-panel.open { display: block; }

  .ref-section {
    border-bottom: 1px solid var(--light-grey);
    padding: 18px 22px;
  }

  .ref-section:last-child { border-bottom: none; }

  .ref-section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--red);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .ref-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .ref-table tr { border-bottom: 1px solid var(--light-grey); }
  .ref-table tr:last-child { border-bottom: none; }
  .ref-table td { padding: 8px 12px; vertical-align: top; }
  .ref-table td:first-child { font-weight: 600; color: var(--charcoal); }
  .ref-table td:last-child { color: var(--grey); }

  .ref-tag {
    display: inline-block;
    background: rgba(192,57,43,0.1);
    color: var(--red);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    margin-right: 4px;
  }

  .ref-word-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .ref-word {
    background: var(--warm);
    border: 1px solid var(--light-grey);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 13px;
    color: var(--charcoal);
  }

  /* DIVIDER */
  .section-divider {
    text-align: center;
    margin: 32px 0;
    position: relative;
  }

  .section-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--light-grey);
  }

  .section-divider span {
    position: relative;
    background: var(--cream);
    padding: 0 16px;
    font-size: 12px;
    color: var(--grey);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--charcoal);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MOBILE */
  @media (max-width: 520px) {
    .header { padding: 12px 16px; }
    .container { padding: 24px 14px; }
    .question-card { padding: 24px 18px; }
    .result-breakdown { grid-template-columns: repeat(3, 1fr); }
    .category-grid { grid-template-columns: repeat(2, 1fr); }
    .header-stats { gap: 8px; }
    .stat-pill { padding: 4px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="index.html" class="header-home">← Ana sayfa</a>
    <div class="header-brand">Gerunds & <span>Infinitives</span></div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="icon">🔥</span> <span id="streakCount">0</span></div>
    <div class="stat-pill"><span class="icon">⭐</span> <span id="totalScore">0</span></div>
  </div>
</header>

<div class="progress-bar-container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="container">
    <div class="home-hero">
      <div class="home-badge">Modadil × Öğrenme Oyunu</div>
      <h1 class="home-title">Gerunds &<br><span class="highlight">Infinitives</span></h1>
      <p class="home-subtitle">Tüm konulardan soru havuzu — kategori seçimi yok. Kurallara göz at veya doğrudan oyuna gir.</p>
    </div>

    <div class="home-cta" style="display:flex; flex-direction:column; align-items:center; gap:14px; margin-top:28px;">
      <button class="btn btn-primary btn-lg" onclick="startGame()">Oyunu Başlat 🚀</button>
      <button class="btn btn-secondary" type="button" onclick="openRefPanel()">📖 Kurallar &amp; özet</button>
    </div>

    <div class="section-divider"><span>Kurallar &amp; referans</span></div>
    <div class="ref-toggle">
      <button class="btn btn-ghost btn-sm" type="button" onclick="toggleRef()">Göster / Gizle</button>
    </div>
    <div class="ref-panel" id="refPanel">
      <div id="refContent"></div>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quizScreen">
  <div class="container">
    <div class="quiz-meta">
      <span class="quiz-category-badge" id="categoryBadge">–</span>
      <span class="quiz-counter" id="questionCounter">Soru 1/20</span>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-type-tag" id="questionType">–</div>
      <div class="question-text" id="questionText">–</div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="explanation-box" id="explanationBox"></div>
    </div>

    <div class="quiz-actions">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">Sonraki Soru →</button>
      <button class="btn btn-ghost btn-sm" onclick="skipQuestion()">Geç ⏭</button>
      <button class="btn btn-ghost btn-sm" onclick="goHome()">↩ Menü</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="resultScreen">
  <div class="container">
    <div class="result-screen">
      <span class="result-emoji" id="resultEmoji">🎉</span>
      <div class="result-score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="58" fill="none" stroke="#E8DDD0" stroke-width="10"/>
          <circle cx="70" cy="70" r="58" fill="none" stroke="#C0392B" stroke-width="10"
            stroke-dasharray="364.4" stroke-dashoffset="364.4" id="resultCircle"
            stroke-linecap="round" style="transition: stroke-dashoffset 1.2s ease;"/>
        </svg>
        <div class="result-score-text">
          <span class="result-score-number" id="resultPct">0%</span>
          <span class="result-score-label">Doğruluk</span>
        </div>
      </div>
      <h2 class="result-title" id="resultTitle">Tebrikler!</h2>
      <p class="result-subtitle" id="resultSubtitle">–</p>
      <div class="result-breakdown">
        <div class="result-stat">
          <span class="result-stat-num green" id="correctCount">0</span>
          <span class="result-stat-label">Doğru</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-num red" id="wrongCount">0</span>
          <span class="result-stat-label">Yanlış</span>
        </div>

      'absorbed in', 'certain about', 'enthusiastic about', 'impatient with', 'accused of', 'certain of',
      'essential to', 'indispensable to', 'accustomed to', 'clever at', 'expert in', 'intolerant of', 'addicted to',
      'concerned about', 'familiar with', 'irrelevant to', 'afraid of', 'concerned with', 'famous for', 'jealous of',
      'alarmed to (+V₀) / alarmed at (+Ving)', 'confident of', 'fatal to', 'keen on', 'amazed at', 'conscious of',
      'favorable to', 'necessary for', 'angry at', 'content with', 'fond of', 'negligent in', 'annoyed at',
      'convenient to / convenient for...', 'free from', 'offensive to', 'appropriate for', 'crazy about',
      'good at', 'optimistic about', 'ashamed of', 'dependent on', 'good for', 'patient with', 'aware of',
      'guilty of', 'pessimistic about', 'capable of', 'eligible for', 'happy about', 'pleased at', 'cautious of',
      'engaged with', 'ignorant of', 'prepared for', 'eager to / eager for + noun (bağlama göre)'
    ]
  },
  {
    title: '✅ Fiiller + To V₀ (liste)',
    words: ('afford, agree, aim, appear, arrange, ask, attempt, beg, begin, care, choose, claim, consent, continue, dare, decide, demand, deserve, expect, fail, happen, hesitate, hope, hurry, intend, leap, leave, long, neglect, offer, plan, prefer, prepare, pretend, proceed, promise, propose, prove, refuse, seem, shoot, strive, struggle, swear, tend, threaten, volunteer, wait, want, wish').split(', ')
  },
  {
    title: '📝 İsimler + To V₀ (liste)',
    words: ('ability, aim, ambition, attempt, capacity, concern, decision, demand, desire, determination, duty, eagerness, effort, enthusiasm, failure, goal, hope, insistence, mission, motivation, need, offer, plan, possibility, potential, power, promise, proposition, refusal, request, right, scheme, skill, strategy, willingness, wish').split(', ')
  },
  {
    title: '🔵 Fiiller + Ving (liste)',
    words: ('acknowledge, admit, advise, allow, anticipate, appreciate, attempt, avoid, can\'t help, celebrate, complete, confess, consider, defend, delay, deny, detest, discuss, dislike, dispute, dread, endure, enjoy, escape, explain, facilitate, fancy, feel like, finish, forgive, give up, imagine, include, justify, keep, mention, mind, miss, necessitate, omit, permit, picture, postpone, practice, prevent, prohibit, propose, quit, recall, recollect, recommend, report, resent, resist, resume, risk, suggest, support, tolerate, understand').split(', ')
  }
];

// ===================================================================
// GAME STATE
// ===================================================================
let state = {
  selectedCats: new Set(CATEGORIES.map(c => c.id)),
  questions: [],
  currentIndex: 0,
  correct: 0,
  wrong: 0,
  skipped: 0,
  streak: 0,
  totalScore: 0,
  answered: false,
};

// ===================================================================
// INIT
// ===================================================================
function init() {
  state.selectedCats = new Set(CATEGORIES.map(c => c.id));
  buildReference();
  updateHeader();
}

function buildReference() {
  const container = document.getElementById('refContent');
  container.innerHTML = '';
  REFERENCE.forEach(section => {
    const div = document.createElement('div');
    div.className = 'ref-section';
    let html = `<div class="ref-section-title">${section.title}</div>`;
    if (section.rows) {
      html += '<table class="ref-table">';
      section.rows.forEach(([k, v]) => {
        html += `<tr><td><span class="ref-tag">●</span>${k}</td><td>${v}</td></tr>`;
      });
      html += '</table>';
    } else if (section.words) {
      html += '<div class="ref-word-cloud">';
      section.words.forEach(w => { html += `<span class="ref-word">${w}</span>`; });
      html += '</div>';
    }
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function toggleRef() {
  const panel = document.getElementById('refPanel');
  panel.classList.toggle('open');
}

function openRefPanel() {
  const panel = document.getElementById('refPanel');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===================================================================
// GAME FLOW
// ===================================================================
function startGame() {
  state.selectedCats = new Set(CATEGORIES.map(c => c.id));
  const pool = QUESTIONS.filter(q => state.selectedCats.has(q.cat));
  if (pool.length === 0) { showToast('Seçili kategorilerde soru bulunamadı!'); return; }

  // Shuffle
  state.questions = [...pool].sort(() => Math.random() - 0.5);
  state.currentIndex = 0;
  state.correct = 0;
  state.wrong = 0;
  state.skipped = 0;
  state.answered = false;

  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;

  document.getElementById('categoryBadge').textContent = CATEGORIES.find(c => c.id === q.cat)?.label || q.cat;
  document.getElementById('questionCounter').textContent = `Soru ${state.currentIndex + 1}/${total}`;
  document.getElementById('questionType').textContent = q.type;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('explanationBox').style.display = 'none';
  document.getElementById('explanationBox').className = 'explanation-box';

  // Update progress
  const pct = (state.currentIndex / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  state.answered = false;

  // Re-animate
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentIndex];
  const buttons = document.querySelectorAll('.option-btn');
  const isCorrect = chosen === q.ans;

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) {
    state.correct++;
    state.streak++;
    state.totalScore += 10 + (state.streak > 2 ? 5 : 0);
    showExplanation(true, q);
  } else {
    state.wrong++;
    state.streak = 0;
    showExplanation(false, q);
  }

  updateHeader();
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function showExplanation(correct, q) {
  const box = document.getElementById('explanationBox');
  box.style.display = 'block';
  box.className = 'explanation-box ' + (correct ? 'correct-exp' : 'wrong-exp');

  const emoji = correct ? '🎯' : '📚';
  const resultText = correct ? 'Doğru!' : 'Yanlış';
  const resultClass = correct ? 'correct-text' : 'wrong-text';
  const answerLine = correct ? '' : `<div class="exp-answer">✅ Doğru cevap: <strong>${q.opts[q.ans]}</strong></div>`;

  box.innerHTML = `
    <div class="exp-header">
      <span class="exp-emoji">${emoji}</span>
      <span class="exp-result ${resultClass}">${resultText}</span>
    </div>
    ${answerLine}
    <div class="exp-why">💡 ${q.why}</div>
    <div class="exp-rule">📖 <strong>Kural:</strong> ${q.rule.replace(/\n/g, '<br>')}</div>
  `;
}

function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function skipQuestion() {
  if (!state.answered) {
    state.skipped++;
    state.streak = 0;
  }
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('resultScreen');
  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);

  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('correctCount').textContent = state.correct;
  document.getElementById('wrongCount').textContent = state.wrong;
  document.getElementById('skipCount').textContent = state.skipped;

  // Messages
  let emoji, title, subtitle;
  if (pct >= 90) { emoji = '🏆'; title = 'Mükemmel!'; subtitle = 'Gerunds & Infinitives konusuna hâkimsin. Harika iş!'; }
  else if (pct >= 75) { emoji = '🎯'; title = 'Çok İyi!'; subtitle = 'Konuyu büyük ölçüde kavramışsın. Küçük hatalar normal!'; }
  else if (pct >= 55) { emoji = '📚'; title = 'Güzel İlerleme!'; subtitle = 'Temel kavramları anladın. Pratik yaparsan çok daha iyi olacak.'; }
  else { emoji = '💪'; title = 'Devam Et!'; subtitle = 'Her hata bir öğrenme fırsatı. Tekrar oyna ve kuralları pekiştir!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSubtitle').textContent = subtitle;

  // Animate ring
  setTimeout(() => {
    const circumference = 364.4;
    const offset = circumference - (pct / 100) * circumference;
    document.getElementById('resultCircle').style.strokeDashoffset = offset;
  }, 100);

  document.getElementById('progressFill').style.width = '100%';
}

function restartGame() { startGame(); }
function goHome() { showScreen('homeScreen'); document.getElementById('progressFill').style.width = '0%'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateHeader() {
  document.getElementById('streakCount').textContent = state.streak;
  document.getElementById('totalScore').textContent = state.totalScore;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Start
init();
</script>
</body>
</html>
