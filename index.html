<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Kartları - Öğrenme Sistemi</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Kelime Kartları</h1>
            <p>İngilizce Kelime Öğrenme Sistemi</p>
            <p id="totalWordsCount" style="font-size: 0.85rem; margin-top: 5px; opacity: 0.9;">Toplam kelime sayısı yükleniyor...</p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px; flex-wrap: wrap;">
                <a href="plan.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">📋 Öğrenme Planını Görüntüle</a>
                <a href="verbs.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">📖 Fiil Halleri</a>
                <a href="practice.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">📝 Hatırlamadıklarım</a>
                <a href="prepositions.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">📌 in / on / at Oyunu</a>
                <a href="times.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">⏰ İngilizce Zamanlar</a>
                <a href="isti-moda.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">🧵 İSTİ Moda</a>
                <a href="gerunds_infinitives_game.html" style="color: white; text-decoration: underline; font-size: 0.9rem; opacity: 0.9;">🔤 Gerunds &amp; Infinitives</a>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="modeSelect">Öğrenme Modu</label>
                <select id="modeSelect">
                    <option value="full">Tam Öğrenme Modu</option>
                    <option value="en-tr">İngilizce → Türkçe</option>
                    <option value="tr-en">Türkçe → İngilizce</option>
                    <option value="tr-examples-only">Sadece Türkçe Cümle</option>
                </select>
            </div>

            <div class="control-group" id="readAllExamplesGroup" style="display: none;">
                <button id="readAllExamplesBtn" class="reset-btn">🔊 Tüm İngilizce Cümleleri Oku</button>
            </div>

            <div class="control-group" id="startLearningGroup" style="display: none;">
                <button id="startLearningBtn" class="reset-btn">🎓 Öğrenme Başlat</button>
            </div>

            <div class="control-group">
                <label for="dateFilter">Tarih Filtresi</label>
                    <select id="dateFilter">
                        <option value="all">Tümünü Göster</option>
                    <option value="today" >Bugün Eklenenler</option>
                    </select>
                </div>

            <div class="control-group">
                <label for="cardsPerPageSelect">Sayfa Başına Kart</label>
                <select id="cardsPerPageSelect">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>

            <div class="control-group" style="width: 100%;">
                <label for="searchInput">🔍 Arama (Kelime veya Anlam)</label>
                <input type="text" id="searchInput" placeholder="Kelime veya anlam ara..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;">
                </div>
            </div>

        <div class="pagination pagination-top" id="paginationTop">
            <div class="pagination-info" id="paginationInfoTop"></div>
            <div class="pagination-buttons">
                <button class="pagination-btn" id="prevBtnTop">Önceki</button>
                <button class="pagination-btn reset-btn-inline" id="resetCardsBtnTop" title="Açık Kartları Gizle">🙈</button>
                <button class="pagination-btn" id="nextBtnTop">Sonraki</button>
            </div>
        </div>

        <div class="cards-container" id="cardsContainer">
            <!-- Kartlar buraya eklenecek -->
        </div>

        <div class="pagination" id="pagination">
            <div class="pagination-info" id="paginationInfo"></div>
            <div class="pagination-buttons">
                <button class="pagination-btn" id="prevBtn">Önceki</button>
                <button class="pagination-btn reset-btn-inline" id="resetCardsBtn" title="Açık Kartları Gizle">🙈</button>
                <button class="pagination-btn" id="nextBtn">Sonraki</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
